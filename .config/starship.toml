"""

[shell]
disabled = false
format = "[î€‡ $indicator ]($style)"
style = "fg:bright-white bg:black inverted bold"
bash_indicator = 'BASH'
zsh_indicator = 'ZSH'
fish_indicator = 'FISH'

[directory]
format = "[ î—؟ $path]($style)"
style = "fg:bright-white bg:bright-black"
truncation_length = 3
truncation_symbol = ".../"

[git_branch]
format = '[ $symbol$branch(:$remote_branch)]($style)'
style = 'bg:black fg:bright-black bold'

[git_status]
format = '[ $all_status$ahead_behind]($style)'
style = 'bg:black bold red'

[fill]
symbol = ' '
style = 'bg:black'

[cmd_duration]
min_time = 1000
show_milliseconds = false
disabled = false
format="[$duration ]($style)"
style="bg:black fg:bright-black bold"

[username]
show_always = true
style_user = "bg:bright-black"
format = '[ $user ]($style)'

[time]
disabled = false
time_format = "%R"
style = "bg:black fg:bright-white inverted bold"
format = '[ $time]($style)'

[os]
disabled = false
format = "[ $symbol ]($style)"
style = "bg:black fg:bright-white inverted bold"

