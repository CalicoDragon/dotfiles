"$schema" = 'https://starship.rs/config-schema.json'

add_newline = false

format = """
[â–ˆ](fg:bright-white)\
$shell\
[î‚¼](fg:bright-white bg:white)\
[î‚¼](fg:white bg:bright-black)\
$directory\
[â–ˆî‚¼](fg:bright-black bg:black)\
$git_branch\
$git_status\
$fill\
$cmd_duration\
[î‚¼](fg:black bg:bright-black)\
$username\
[î‚¼](fg:bright-black bg:white)\
[î‚¼](fg:white bg:bright-white)\
$time\
$os\
[â–ˆ](fg:bright-white)\
$line_break\
